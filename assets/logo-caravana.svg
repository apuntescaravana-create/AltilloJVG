<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 180" width="100%" height="100%">
  <!-- Background -->
  <rect width="450" height="180" rx="12" fill="#009BE3"/>

  <g transform="translate(25, 30)">
    <!-- Building Icon -->
    <g fill="none" stroke="#FFFFFF" stroke-width="4.5" stroke-linejoin="round" stroke-linecap="round">
      <!-- Main Outer Frame -->
      <rect x="5" y="20" width="65" height="80" rx="2"/>
      <line x1="5" y1="46" x2="70" y2="46"/>
      <line x1="5" y1="72" x2="70" y2="72"/>
      
      <!-- Windows / Grid lines -->
      <line x1="26" y1="20" x2="26" y2="72"/>
      <line x1="48" y1="20" x2="48" y2="72"/>

      <rect x="15" y="27" width="22" height="12" fill="#FFFFFF" opacity="0.3"/>
      <rect x="40" y="78" width="20" height="22" fill="#FFFFFF"/>
    </g>

    <!-- Text Section -->
    <text x="80" y="32" font-family="'Outfit', 'Arial Black', sans-serif" font-weight="900" font-size="20" fill="#FFFFFF" letter-spacing="1">LA</text>
    <text x="80" y="75" font-family="'Outfit', 'Arial Black', sans-serif" font-weight="900" font-size="44" fill="#FFFFFF" letter-spacing="-0.5">CARAVANA</text>
    
    <!-- Underline -->
    <line x1="80" y1="84" x2="390" y2="84" stroke="#FFFFFF" stroke-width="3"/>
    
    <!-- Subtitle -->
    <text x="83" y="110" font-family="'Inter', sans-serif" font-weight="700" font-size="20" fill="#FFFFFF" letter-spacing="0.5">Patria Grande en el Joaquín</text>
  </g>
</svg>
