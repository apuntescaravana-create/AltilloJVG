<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <defs>
    <linearGradient id="owlBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A365D" />
      <stop offset="100%" stop-color="#0F243A" />
    </linearGradient>

    <linearGradient id="owlGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#AA7C11" />
    </linearGradient>

    <linearGradient id="wingGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1D385C" />
      <stop offset="50%" stop-color="#152B47" />
      <stop offset="100%" stop-color="#0A1828" />
    </linearGradient>

    <linearGradient id="goldAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C4933F" />
      <stop offset="50%" stop-color="#E5C158" />
      <stop offset="100%" stop-color="#B8852E" />
    </linearGradient>
  </defs>

  <!-- BACKGROUND DECORATIVE GLOW -->
  <circle cx="250" cy="200" r="180" fill="#F4F8FC" />

  <!-- BOOKS BASE LAYER -->
  <g id="books" transform="translate(80, 260)">
    <!-- Bottom Book -->
    <path d="M 40 70 L 300 70 C 310 70 320 78 320 88 L 320 100 C 320 100 200 110 40 100 L 40 70 Z" fill="#1A365D" />
    <path d="M 40 100 C 200 110 320 100 320 100 L 310 115 C 310 115 190 125 40 112 L 40 100 Z" fill="#E2E8F0" />
    <path d="M 35 70 L 40 70 L 40 112 L 35 110 C 30 100 30 80 35 70 Z" fill="#C4933F" />
    <line x1="320" y1="80" x2="345" y2="80" stroke="#C4933F" stroke-width="4" stroke-linecap="round" />
    <line x1="320" y1="92" x2="340" y2="92" stroke="#C4933F" stroke-width="4" stroke-linecap="round" />

    <!-- Middle Book -->
    <path d="M 60 35 L 290 35 C 300 35 308 42 308 52 L 308 65 C 308 65 190 75 60 65 L 60 35 Z" fill="#2B4C7E" />
    <path d="M 60 65 C 190 75 308 65 308 65 L 300 78 C 300 78 180 88 60 76 L 60 65 Z" fill="#F1F5F9" />
    <path d="M 55 35 L 60 35 L 60 76 L 55 74 C 50 65 50 45 55 35 Z" fill="#E5C158" />

    <!-- Top Open Book -->
    <!-- Left page -->
    <path d="M 80 20 C 130 5 175 25 190 32 L 190 40 C 175 33 130 15 80 30 Z" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
    <path d="M 75 22 C 125 7 175 24 190 32 L 190 35 C 175 27 125 10 75 25 Z" fill="#F8FAFC" />
    <!-- Right page -->
    <path d="M 300 20 C 250 5 205 25 190 32 L 190 40 C 205 33 250 15 300 30 Z" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
  </g>

  <!-- FLYING OWL ILLUSTRATION -->
  <g id="owl">
    <!-- LEFT WING -->
    <g id="leftWing">
      <path d="M 210 160 C 170 120 120 70 60 40 C 90 75 110 110 135 150 C 110 130 80 100 40 85 C 70 125 100 160 145 185 C 115 175 85 160 60 150 C 90 180 125 205 170 215 L 210 160 Z" fill="url(#wingGradient)" />
      <path d="M 120 70 C 100 110 130 150 165 175 C 140 140 120 100 120 70 Z" fill="#C4933F" opacity="0.8" />
    </g>

    <!-- RIGHT WING -->
    <g id="rightWing">
      <path d="M 270 150 C 300 100 330 60 380 25 C 355 65 335 105 315 145 C 345 115 375 85 410 65 C 380 105 350 145 315 175 C 345 160 375 145 400 135 C 365 170 330 195 285 210 L 270 150 Z" fill="url(#wingGradient)" />
      <path d="M 330 60 C 335 105 315 145 295 170 C 320 130 330 90 330 60 Z" fill="#C4933F" opacity="0.8" />
    </g>

    <!-- OWL BODY -->
    <path d="M 205 150 C 200 200 215 250 240 265 C 265 250 280 200 275 150 Z" fill="url(#owlBlue)" />
    <!-- Chest Feathers Detail -->
    <path d="M 220 180 C 240 190 260 180 260 180 C 255 205 240 225 240 225 C 240 225 225 205 220 180 Z" fill="#F8FAFC" />
    <path d="M 230 190 C 240 195 250 190 250 190 C 247 205 240 215 240 215 C 240 215 233 205 230 190 Z" fill="#C4933F" />

    <!-- OWL HEAD -->
    <circle cx="240" cy="135" r="45" fill="url(#owlBlue)" />
    <!-- White Face Mask -->
    <path d="M 240 120 C 220 95 195 120 215 145 C 230 160 240 162 240 162 C 240 162 250 160 265 145 C 285 120 260 95 240 120 Z" fill="#FFFFFF" />

    <!-- EYES -->
    <!-- Left Eye -->
    <circle cx="222" cy="130" r="14" fill="#0A1828" />
    <circle cx="222" cy="130" r="10" fill="url(#owlGold)" />
    <circle cx="222" cy="130" r="6" fill="#050B14" />
    <circle cx="220" cy="127" r="2.5" fill="#FFFFFF" />

    <!-- Right Eye -->
    <circle cx="258" cy="130" r="14" fill="#0A1828" />
    <circle cx="258" cy="130" r="10" fill="url(#owlGold)" />
    <circle cx="258" cy="130" r="6" fill="#050B14" />
    <circle cx="256" cy="127" r="2.5" fill="#FFFFFF" />

    <!-- BEAK -->
    <polygon points="240,138 234,148 246,148" fill="#D4AF37" stroke="#997510" stroke-width="1" />

    <!-- FEET / TALONS -->
    <path d="M 225 260 L 220 272 M 225 260 L 225 274 M 225 260 L 230 272" stroke="#D4AF37" stroke-width="3" stroke-linecap="round" />
    <path d="M 255 260 L 250 272 M 255 260 L 255 274 M 255 260 L 260 272" stroke="#D4AF37" stroke-width="3" stroke-linecap="round" />
  </g>
</svg>
